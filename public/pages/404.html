<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Seekho Two Wheeler Academy</title>
  <meta name="description" content="The page you are looking for could not be found. Return to Seekho Two Wheeler Academy homepage.">
  <link rel="canonical" href="https://seekho2wheeler.vercel.app/pages/404.html">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .error-page { min-height: 60vh; display: grid; place-items: center; text-align: center; padding: 4rem 1rem; }
    .error-page__code { font-family: var(--font-display); font-size: clamp(4rem, 12vw, 7rem); font-weight: 800; color: var(--primary); line-height: 1; }
    .error-page__title { font-family: var(--font-display); font-size: clamp(1.5rem, 3vw, 2rem); font-weight: 700; margin: 0.75rem 0; }
    .error-page__desc { color: var(--text-muted); max-width: 420px; margin: 0 auto 1.5rem; }
    .error-page__actions { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; }
  </style>
</head>
<body>
  <div class="page-loader"><div class="spinner"></div></div>
  <div id="site-header-mount"></div>

  <main>
    <section class="error-page">
      <div>
        <div class="error-page__code">404</div>
        <h1 class="error-page__title">Page Not Found</h1>
        <p class="error-page__desc">Sorry, the page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
        <div class="error-page__actions">
          <a href="/" class="btn btn--primary"><i class="fa-solid fa-house"></i> Go Home</a>
          <a href="/pages/courses.html" class="btn btn--outline">View Courses</a>
          <a href="/pages/contact.html" class="btn btn--outline">Contact Us</a>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer-mount"></div>

  <script src="/js/layout.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>

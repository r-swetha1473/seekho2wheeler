<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Login — Seekho Two Wheeler Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-brand__logo">S</div>
        <h1>Seekho Admin</h1>
        <p>Two Wheeler Academy Dashboard</p>
      </div>

      <div class="login-error" id="loginError"></div>

      <form class="login-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" value="admin@seekhoacademy.com" required autocomplete="username" placeholder="admin@seekhoacademy.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn--primary" style="width:100%;padding:0.85rem;" id="loginBtn">
          Sign In
        </button>
      </form>

      <p class="login-hint">Default admin: admin@seekhoacademy.com</p>
    </div>
  </div>

  <script>
    const TOKEN_KEY = 'seekho_admin_token';

    if (localStorage.getItem(TOKEN_KEY)) {
      window.location.href = '/admin/';
    }

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('loginError');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('show');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        errorEl.textContent = 'Please enter email and password.';
        errorEl.classList.add('show');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const json = await res.json();

        if (!res.ok || !json.success) {
          throw new Error(json.message || 'Login failed');
        }

        localStorage.setItem(TOKEN_KEY, json.data.token);
        window.location.href = '/admin/';
      } catch (err) {
        errorEl.textContent = err.message || 'Unable to sign in. Please try again.';
        errorEl.classList.add('show');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>

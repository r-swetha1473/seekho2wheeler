<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Dashboard — Seekho Two Wheeler Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar__brand">
        <div class="admin-sidebar__logo">S</div>
        <div class="admin-sidebar__title">
          Seekho Academy
          <span>Admin Panel</span>
        </div>
      </div>

      <nav class="admin-nav" id="adminNav">
        <a href="#dashboard" class="admin-nav__item" data-route="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
        <a href="#banners" class="admin-nav__item" data-route="banners">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
          Banners
        </a>
        <a href="#gallery" class="admin-nav__item" data-route="gallery">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          Gallery
        </a>
        <a href="#blogs" class="admin-nav__item" data-route="blogs">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
          Blogs
        </a>
        <a href="#branches" class="admin-nav__item" data-route="branches">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/><path d="M9 9v.01M9 12v.01M9 15v.01M9 18v.01"/></svg>
          Branches
        </a>
        <a href="#pricing" class="admin-nav__item" data-route="pricing">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Pricing
        </a>
        <a href="#bookings" class="admin-nav__item" data-route="bookings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          Bookings
        </a>
        <a href="#enquiries" class="admin-nav__item" data-route="enquiries">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Enquiries
        </a>
        <a href="#faqs" class="admin-nav__item" data-route="faqs">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01"/></svg>
          FAQs
        </a>
        <a href="#testimonials" class="admin-nav__item" data-route="testimonials">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Testimonials
        </a>
        <a href="#settings" class="admin-nav__item" data-route="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </a>

        <div class="admin-nav__divider"></div>

        <a href="#" class="admin-nav__item" id="logoutBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          Logout
        </a>
      </nav>

      <div class="admin-sidebar__footer">
        <div class="admin-topbar__user" id="sidebarUser" style="padding:0 0.85rem;font-size:0.8rem;color:rgba(255,255,255,0.5);"></div>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="admin-main">
      <header class="admin-topbar">
        <div class="admin-topbar__left">
          <button class="admin-topbar__menu-btn" id="sidebarToggle" aria-label="Toggle menu">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <h1 class="admin-topbar__title" id="pageTitle">Dashboard</h1>
        </div>
        <div class="admin-topbar__right">
          <div class="notif-wrapper">
            <button class="admin-notif-btn" id="notifBtn" aria-label="Notifications">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              <span class="admin-notif-btn__badge" id="notifBadge" data-count="0"></span>
            </button>
            <div class="notif-panel" id="notifPanel">
              <div class="notif-panel__header">
                <span>Notifications</span>
                <button class="btn btn--sm btn--outline" id="markAllRead">Mark all read</button>
              </div>
              <div class="notif-panel__list" id="notifList"></div>
            </div>
          </div>
          <span class="admin-topbar__user" id="topbarUser"></span>
        </div>
      </header>

      <main class="admin-content" id="adminContent">
        <div class="loading"><div class="loading__spinner"></div> Loading…</div>
      </main>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modal">
      <div class="modal__header">
        <h3 class="modal__title" id="modalTitle"></h3>
        <button class="modal__close" id="modalClose" aria-label="Close">&times;</button>
      </div>
      <div class="modal__body" id="modalBody"></div>
      <div class="modal__footer" id="modalFooter"></div>
    </div>
  </div>

  <div class="modal-backdrop confirm-dialog" id="confirmBackdrop">
    <div class="modal">
      <div class="modal__header">
        <h3 class="modal__title" id="confirmTitle">Confirm</h3>
      </div>
      <div class="modal__body">
        <p class="confirm-dialog__message" id="confirmMessage"></p>
      </div>
      <div class="modal__footer">
        <button class="btn btn--outline" id="confirmCancel">Cancel</button>
        <button class="btn btn--danger" id="confirmOk">Delete</button>
      </div>
    </div>
  </div>

  <script type="module" src="/admin/js/admin.js"></script>
</body>
</html>
